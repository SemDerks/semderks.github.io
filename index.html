<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pomodoro Timer</title>
<meta name="theme-color" content="#1a1a1a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231D9E75'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #1a1a1a;
    color: #f1f1f1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
    overflow-y: auto;
    user-select: none;
  }

  /* ---------- Setup-scherm ---------- */
  .setup {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .setup h1 {
    font-size: 22px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 4px;
  }
  .setup .sub {
    font-size: 13px;
    color: #888;
    text-align: center;
    margin-top: -12px;
    margin-bottom: 4px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-size: 12px;
    color: #999;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .field input[type="time"] {
    background: #2a2a2a;
    color: #f1f1f1;
    border: 1px solid #3a3a3a;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    width: 100%;
  }
  .field input[type="time"]:focus {
    outline: none;
    border-color: #1D9E75;
  }
  .toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 4px;
  }
  .toggle button {
    background: transparent;
    color: #ccc;
    border: none;
    padding: 10px 8px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    line-height: 1.3;
  }
  .toggle button .top { font-weight: 500; font-size: 14px; }
  .toggle button .bot { font-size: 11px; color: #888; margin-top: 2px; }
  .toggle button.active {
    background: #1D9E75;
    color: #fff;
  }
  .toggle button.active .bot { color: rgba(255,255,255,0.85); }

  .primary-btn {
    background: #1D9E75;
    color: #fff;
    border: none;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
  }
  .primary-btn:hover { background: #178a66; }
  .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error {
    font-size: 12px;
    color: #f08080;
    text-align: center;
    min-height: 14px;
  }

  /* ---------- Timer-scherm ---------- */
  .timer {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .phase {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #999;
  }
  .ring-wrap {
    position: relative;
    width: min(72vmin, 280px);
    height: min(72vmin, 280px);
  }
  .ring-wrap svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .time-display {
    font-size: clamp(40px, 14vmin, 60px);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .now-display {
    font-size: 12px;
    color: #777;
    font-variant-numeric: tabular-nums;
  }
  .status {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    min-height: 16px;
  }
  .timer-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .timer-controls button {
    background: #2a2a2a;
    color: #f1f1f1;
    border: 1px solid #3a3a3a;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .timer-controls button:hover { background: #333; }
  .timer-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

  .meta {
    font-size: 10px;
    color: #666;
    text-align: center;
    max-width: 90%;
    margin-top: 4px;
  }

  @media (max-height: 380px) {
    body { padding: 8px; }
    .meta, .now-display { display: none; }
  }
</style>
</head>
<body>

  <!-- ---------- Setup ---------- -->
  <div class="setup" id="setup-screen">
    <h1>Pomodoro</h1>
    <p class="sub">Stel je sessie in</p>

    <div class="field">
      <label for="start-time">Begintijd</label>
      <input type="time" id="start-time" value="09:00">
    </div>

    <div class="field">
      <label for="stop-time">Eindtijd</label>
      <input type="time" id="stop-time" value="13:00">
    </div>

    <div class="field">
      <label>Werkblok</label>
      <div class="toggle" id="length-toggle">
        <button type="button" data-work="25" data-break="5">
          <div class="top">25 min</div>
          <div class="bot">+ 5 min pauze</div>
        </button>
        <button type="button" data-work="50" data-break="10" class="active">
          <div class="top">50 min</div>
          <div class="bot">+ 10 min pauze</div>
        </button>
      </div>
    </div>

    <button class="primary-btn" id="start-btn">Start sessie</button>
    <div class="error" id="error-msg"></div>
  </div>

  <!-- ---------- Timer ---------- -->
  <div class="timer" id="timer-screen" hidden>
    <div class="phase" id="phase-label">Laden...</div>

    <div class="ring-wrap">
      <svg viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="120" fill="none" stroke="#2a2a2a" stroke-width="12"></circle>
        <circle id="progress-ring" cx="140" cy="140" r="120" fill="none" stroke="#378ADD" stroke-width="12" stroke-linecap="round" stroke-dasharray="753.98" stroke-dashoffset="0"></circle>
      </svg>
      <div class="center">
        <div class="time-display" id="time-display">--:--</div>
        <div class="now-display" id="now-display"></div>
      </div>
    </div>

    <div class="status" id="status-line"></div>

    <div class="timer-controls">
      <button id="notif-btn">Meldingen aan</button>
      <button id="back-btn">Wijzig</button>
    </div>

    <div class="meta">
      Tip: pop dit venster los en zet hem in een hoekje. Notificaties + geluid blijven werken zolang het tabblad open staat.
    </div>
  </div>

<script>
(function() {
  const STORAGE_KEY = 'pomodoro-config-v1';
  const COLOR_WORK = '#378ADD';
  const COLOR_BREAK = '#EF9F27';
  const COLOR_DONE = '#888';

  // DOM
  const setupScreen = document.getElementById('setup-screen');
  const timerScreen = document.getElementById('timer-screen');
  const startInput = document.getElementById('start-time');
  const stopInput = document.getElementById('stop-time');
  const toggle = document.getElementById('length-toggle');
  const startBtn = document.getElementById('start-btn');
  const errorMsg = document.getElementById('error-msg');

  const ring = document.getElementById('progress-ring');
  const timeDisplay = document.getElementById('time-display');
  const nowDisplay = document.getElementById('now-display');
  const phaseLabel = document.getElementById('phase-label');
  const statusLine = document.getElementById('status-line');
  const notifBtn = document.getElementById('notif-btn');
  const backBtn = document.getElementById('back-btn');

  const CIRC = 2 * Math.PI * 120;
  ring.setAttribute('stroke-dasharray', CIRC.toFixed(2));

  function pad(n) { return String(n).padStart(2, '0'); }
  function formatMMSS(ms) {
    if (ms < 0) ms = 0;
    const total = Math.ceil(ms / 1000);
    return pad(Math.floor(total / 60)) + ':' + pad(total % 60);
  }

  // Config
  let config = null; // { startHHMM, stopHHMM, workMin, breakMin }

  function loadConfig() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const c = JSON.parse(raw);
      if (!c.startHHMM || !c.stopHHMM || !c.workMin || !c.breakMin) return null;
      return c;
    } catch (e) { return null; }
  }
  function saveConfig(c) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); } catch (e) {}
  }
  function clearConfig() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  // Toggle gedrag
  let selectedWork = 50, selectedBreak = 10;
  toggle.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedWork = Number(btn.dataset.work);
      selectedBreak = Number(btn.dataset.break);
    });
  });

  function setToggle(workMin) {
    toggle.querySelectorAll('button').forEach(b => {
      if (Number(b.dataset.work) === workMin) {
        b.classList.add('active');
        selectedWork = Number(b.dataset.work);
        selectedBreak = Number(b.dataset.break);
      } else {
        b.classList.remove('active');
      }
    });
  }

  // ---------- Time-state berekening ----------
  function hhmmToDate(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }

  function computeState() {
    const now = new Date();
    const start = hhmmToDate(config.startHHMM);
    const stop = hhmmToDate(config.stopHHMM);

    if (now < start) {
      const wait = start.getTime() - now.getTime();
      return { phase: 'wachten', remaining: wait, total: wait, nextSwitch: start, done: false };
    }
    if (now >= stop) {
      return { phase: 'klaar', remaining: 0, total: 1, nextSwitch: null, done: true };
    }

    const workMs = config.workMin * 60 * 1000;
    const breakMs = config.breakMin * 60 * 1000;
    const cycleMs = workMs + breakMs;
    const intoCycle = (now.getTime() - start.getTime()) % cycleMs;

    let phase, total, remaining, nextSwitch;
    if (intoCycle < workMs) {
      phase = 'werk';
      total = workMs;
      remaining = workMs - intoCycle;
    } else {
      phase = 'pauze';
      total = breakMs;
      remaining = cycleMs - intoCycle;
    }
    nextSwitch = new Date(now.getTime() + remaining);
    if (nextSwitch > stop) {
      remaining = stop.getTime() - now.getTime();
      nextSwitch = stop;
    }
    return { phase, remaining, total, nextSwitch, done: false };
  }

  // ---------- Audio + notificaties ----------
  let audioCtx = null;
  function ensureAudio() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) {}
  }
  function beep(pattern) {
    ensureAudio();
    if (!audioCtx) return;
    pattern.forEach(([freq, start, dur]) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = freq;
      o.type = 'sine';
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + dur);
      o.start(audioCtx.currentTime + start);
      o.stop(audioCtx.currentTime + start + dur + 0.05);
    });
  }
  function showNotif(title, body) {
    try {
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        new Notification(title, { body });
      }
    } catch (e) {}
    document.title = '* ' + title;
    setTimeout(updateTitle, 4000);
  }
  function notifyBreak() {
    beep([[880,0,0.25],[660,0.3,0.25],[523,0.6,0.4]]);
    showNotif('Tijd voor pauze', 'Je werkblok zit erop. Neem ' + config.breakMin + ' min pauze.');
  }
  function notifyWork() {
    beep([[523,0,0.2],[660,0.25,0.2],[880,0.5,0.4]]);
    showNotif('Weer aan het werk', 'Pauze voorbij. Tijd voor ' + config.workMin + ' min focus.');
  }
  function notifyDone() {
    beep([[660,0,0.2],[660,0.3,0.2],[880,0.6,0.5]]);
    showNotif('Pomodoro klaar', 'Sessie afgelopen om ' + config.stopHHMM + '.');
  }

  function updateTitle() {
    if (!config) { document.title = 'Pomodoro Timer'; return; }
    const s = computeState();
    if (s.done) { document.title = 'Klaar · Pomodoro'; return; }
    if (s.phase === 'wachten') { document.title = 'Start ' + config.startHHMM + ' · Pomodoro'; return; }
    document.title = formatMMSS(s.remaining) + ' · ' + (s.phase === 'werk' ? 'Werk' : 'Pauze');
  }

  // ---------- Tick ----------
  let lastPhase = null;
  let initialized = false;
  let tickInterval = null;

  function tick() {
    if (!config) return;
    const now = new Date();
    nowDisplay.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());

    const s = computeState();

    if (initialized && lastPhase !== s.phase) {
      if (s.done) notifyDone();
      else if (lastPhase === 'werk' && s.phase === 'pauze') notifyBreak();
      else if (lastPhase === 'pauze' && s.phase === 'werk') notifyWork();
    }
    lastPhase = s.phase;
    initialized = true;

    if (s.done) {
      phaseLabel.textContent = 'Klaar';
      phaseLabel.style.color = COLOR_DONE;
      timeDisplay.textContent = '00:00';
      ring.setAttribute('stroke', COLOR_DONE);
      ring.setAttribute('stroke-dashoffset', CIRC.toFixed(2));
      statusLine.textContent = 'Het is ' + config.stopHHMM + '. Goed gedaan!';
      updateTitle();
      return;
    }

    if (s.phase === 'wachten') {
      phaseLabel.textContent = 'Wachten op start';
      phaseLabel.style.color = COLOR_DONE;
      timeDisplay.textContent = formatMMSS(s.remaining);
      ring.setAttribute('stroke', COLOR_DONE);
      ring.setAttribute('stroke-dashoffset', '0');
      statusLine.textContent = 'Begint om ' + config.startHHMM;
      updateTitle();
      return;
    }

    timeDisplay.textContent = formatMMSS(s.remaining);
    if (s.phase === 'werk') {
      phaseLabel.textContent = 'Werken';
      phaseLabel.style.color = COLOR_WORK;
      ring.setAttribute('stroke', COLOR_WORK);
    } else {
      phaseLabel.textContent = 'Pauze';
      phaseLabel.style.color = COLOR_BREAK;
      ring.setAttribute('stroke', COLOR_BREAK);
    }
    const frac = Math.max(0, Math.min(1, s.remaining / s.total));
    ring.setAttribute('stroke-dashoffset', (CIRC * (1 - frac)).toFixed(2));

    if (s.nextSwitch) {
      statusLine.textContent = 'Volgende wissel om ' + pad(s.nextSwitch.getHours()) + ':' + pad(s.nextSwitch.getMinutes());
    }
    updateTitle();
  }

  // ---------- Schermwissels ----------
  function showTimer() {
    setupScreen.hidden = true;
    timerScreen.hidden = false;
    initialized = false;
    lastPhase = null;
    if (!tickInterval) tickInterval = setInterval(tick, 250);
    tick();

    if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
      notifBtn.textContent = 'Meldingen aan';
      notifBtn.disabled = true;
    } else {
      notifBtn.textContent = 'Meldingen aan';
      notifBtn.disabled = false;
    }
  }

  function showSetup() {
    if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
    timerScreen.hidden = true;
    setupScreen.hidden = false;
    document.title = 'Pomodoro Timer';
  }

  // ---------- Knoppen ----------
  startBtn.addEventListener('click', () => {
    errorMsg.textContent = '';
    const startHHMM = startInput.value;
    const stopHHMM = stopInput.value;
    if (!/^\d{2}:\d{2}$/.test(startHHMM) || !/^\d{2}:\d{2}$/.test(stopHHMM)) {
      errorMsg.textContent = 'Vul een geldige begin- en eindtijd in.';
      return;
    }
    if (startHHMM >= stopHHMM) {
      errorMsg.textContent = 'Eindtijd moet na begintijd liggen.';
      return;
    }
    config = {
      startHHMM,
      stopHHMM,
      workMin: selectedWork,
      breakMin: selectedBreak
    };
    saveConfig(config);
    ensureAudio(); // unlock audio bij user gesture
    showTimer();
  });

  notifBtn.addEventListener('click', () => {
    ensureAudio();
    if (typeof Notification === 'undefined') {
      notifBtn.textContent = 'Niet ondersteund';
      notifBtn.disabled = true;
      return;
    }
    if (Notification.permission === 'granted') {
      notifBtn.textContent = 'Meldingen aan';
      notifBtn.disabled = true;
      return;
    }
    Notification.requestPermission().then(p => {
      if (p === 'granted') { notifBtn.textContent = 'Meldingen aan'; notifBtn.disabled = true; }
      else { notifBtn.textContent = 'Geweigerd'; }
    });
  });

  backBtn.addEventListener('click', () => {
    clearConfig();
    config = null;
    showSetup();
  });

  // ---------- Init ----------
  const stored = loadConfig();
  if (stored) {
    config = stored;
    startInput.value = stored.startHHMM;
    stopInput.value = stored.stopHHMM;
    setToggle(stored.workMin);
    showTimer();
  }
})();
</script>
</body>
</html>
